<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orionOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Minimal, Clean SVG Icons
        const SystemIcon = () => (
            <svg class="w-5 h-5 text-zinc-400 group-hover:text-zinc-100 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        );
        const MediaIcon = () => (
            <svg class="w-5 h-5 text-zinc-400 group-hover:text-zinc-100 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>
        );
        const StorageIcon = () => (
            <svg class="w-5 h-5 text-zinc-400 group-hover:text-zinc-100 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const AnalyticsIcon = () => (
            <svg class="w-5 h-5 text-zinc-400 group-hover:text-zinc-100 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        );
        const SettingsIcon = () => (
            <svg class="w-4 h-4 text-zinc-400 hover:text-zinc-200 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        );

        function OrionOS() {
            const [time, setTime] = React.useState('');
            const [activeWindow, setActiveWindow] = React.useState('dashboard');
            const [isMaximized, setIsMaximized] = React.useState(false);

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                };
                updateTime();
                const interval = setInterval(updateTime, 60000);
                return () => clearInterval(interval);
            }, []);

            const apps = [
                { id: 'dashboard', label: 'Dashboard', icon: SystemIcon },
                { id: 'library', label: 'Media Deck', icon: MediaIcon },
                { id: 'files', label: 'Storage', icon: StorageIcon },
                { id: 'analytics', label: 'Analytics', icon: AnalyticsIcon },
            ];

            return (
                <div class="relative w-full h-screen bg-[#09090b] text-zinc-100 overflow-hidden select-none">
                    
                    {/* TOP SYSTEM MENU BAR */}
                    <header class="absolute top-0 left-0 right-0 h-10 z-50 flex items-center justify-between px-6 bg-zinc-900/40 border-b border-zinc-800/40 backdrop-blur-md text-xs font-medium text-zinc-400">
                        <div class="flex items-center gap-5">
                            <span class="text-zinc-100 font-semibold tracking-tight">orionOS</span>
                            <span class="text-zinc-700">|</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">File</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">View</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">Window</span>
                        </div>
                        <div class="flex items-center gap-4 text-zinc-400 font-sans">
                            <span class="text-[11px] bg-zinc-800/60 px-2 py-0.5 rounded border border-zinc-700/40 text-zinc-300">System Connected</span>
                            <span class="font-normal text-zinc-300">{time}</span>
                        </div>
                    </header>

                    {/* MAIN WORKSPACE DESKTOP */}
                    <main class="relative w-full h-full pt-14 pb-20 px-8 flex">
                        
                        {/* LEFT SIDEBAR: OS SIDE DOCK */}
                        <div class="flex flex-col gap-3 z-20 w-44">
                            {apps.map((app) => {
                                const AppIcon = app.icon;
                                const isSelected = activeWindow === app.id;
                                return (
                                    <button 
                                        key={app.id} 
                                        onClick={() => setActiveWindow(app.id)} 
                                        class={`group flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-xs font-medium transition-all duration-150 text-left cursor-pointer
                                            ${isSelected 
                                                ? 'bg-zinc-100 text-zinc-950 shadow-sm font-semibold' 
                                                : 'text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/50'
                                            }`}
                                    >
                                        <div class={isSelected ? 'text-zinc-950' : 'text-zinc-400'}>
                                            <AppIcon />
                                        </div>
                                        <span>{app.label}</span>
                                    </button>
                                );
                            })}
                        </div>

                        {/* WINDOW MANAGER CONTAINER */}
                        {activeWindow && (
                            <div class={`flex-1 ml-6 bg-zinc-900/60 border border-zinc-800/80 backdrop-blur-xl rounded-xl shadow-2xl flex flex-col overflow-hidden transition-all duration-200 ease-out ${isMaximized ? 'fixed inset-4 pt-10 z-40 ml-0' : ''}`}>
                                
                                {/* App Window Top Header */}
                                <div class="h-11 bg-zinc-900/80 border-b border-zinc-800/60 flex items-center justify-between px-5">
                                    <span class="text-xs font-semibold tracking-wide text-zinc-300 capitalize">{activeWindow}</span>
                                    
                                    {/* Window Control Buttons */}
                                    <div class="flex items-center gap-2">
                                        <button onClick={() => setIsMaximized(!isMaximized)} class="w-3 h-3 rounded-full bg-zinc-700 hover:bg-zinc-600 transition-colors flex items-center justify-center cursor-pointer">
                                            <span class="text-[8px] text-zinc-400 block pb-0.5">{isMaximized ? '⌥' : '⤢'}</span>
                                        </button>
                                        <button onClick={() => setActiveWindow(null)} class="w-3 h-3 rounded-full bg-zinc-800 hover:bg-rose-900/50 group transition-colors flex items-center justify-center cursor-pointer">
                                            <span class="text-[8px] text-zinc-500 group-hover:text-rose-400 transition-colors block pb-0.5">✕</span>
                                        </button>
                                    </div>
                                </div>

                                {/* App Internal Content Window */}
                                <div class="flex-1 p-6 overflow-y-auto">
                                    {activeWindow === 'dashboard' ? (
                                        <div class="space-y-6 max-w-4xl">
                                            <div>
                                                <h2 class="text-xl font-bold tracking-tight text-white">System Overview</h2>
                                                <p class="text-xs text-zinc-400 mt-1">Manage configuration settings, profile setups, and interface environments cleanly.</p>
                                            </div>

                                            {/* Minimal Content Boxes */}
                                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-2">
                                                <div class="p-4 rounded-lg bg-zinc-950/40 border border-zinc-800/50">
                                                    <div class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">Memory Blocks</div>
                                                    <div class="text-lg font-semibold text-zinc-200 mt-1">Operational</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-zinc-950/40 border border-zinc-800/50">
                                                    <div class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">Active Stream</div>
                                                    <div class="text-lg font-semibold text-zinc-200 mt-1">1080p Local</div>
                                                </div>
                                                <div class="p-4 rounded-lg bg-zinc-950/40 border border-zinc-800/50">
                                                    <div class="text-[11px] text-zinc-500 font-medium uppercase tracking-wider">Storage Node</div>
                                                    <div class="text-lg font-semibold text-emerald-400 mt-1">98.2% Secure</div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="h-full flex flex-col items-center justify-center text-center opacity-90 py-16">
                                            <h3 class="text-sm font-semibold text-zinc-200 capitalize">{activeWindow} Deck Loaded</h3>
                                            <p class="text-xs text-zinc-500 max-w-xs mt-1.5 leading-relaxed">This module is active and securely attached to the main orionOS application shell tree.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM STATUS FOOTER BAR */}
                    <footer class="absolute bottom-0 left-0 right-0 h-8 px-6 bg-zinc-950 border-t border-zinc-900 flex items-center justify-between text-[11px] text-zinc-500 z-50">
                        <span>Status: Operational</span>
                        <div class="flex items-center gap-1.5 cursor-pointer hover:text-zinc-300 transition-colors">
                            <SettingsIcon />
                            <span>System Settings</span>
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrionOS />);
    </script>
</body>
</html>
