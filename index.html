<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbitOS Desktop</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5'><rect width='18' height='18' x='3' y='3' rx='2'/><path d='M9 3v18M15 3v18M3 9h18M3 15h18'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // Fixed sizes for Tailwind v4 compatibility
        const HubIcon = () => (
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
        );
        const MediaIcon = () => (
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>
        );
        const StorageIcon = () => (
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        );
        const PowerIcon = () => (
            <svg class="w-4 h-4 text-zinc-400 group-hover:text-red-400 transition-colors" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77 0"/></svg>
        );

        // System Core Menu Button Replacement (Hub Grid style instead of orbit icon)
        const SystemMenuIcon = ({ className = "w-6 h-6" }) => (
            <svg 
                class={`${className} text-white transition-colors drop-shadow-[0_0_8px_rgba(255,255,255,0.4)] group-hover:text-cyan-400 group-hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.4)]`} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                stroke-width="1.5"
                stroke-linecap="round" 
                stroke-linejoin="round"
            >
                <rect width="7" height="7" x="3" y="3" rx="1"/>
                <rect width="7" height="7" x="14" y="3" rx="1"/>
                <rect width="7" height="7" x="14" y="14" rx="1"/>
                <rect width="7" height="7" x="3" y="14" rx="1"/>
            </svg>
        );

        function SnowOverlay() {
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);

                const maxFlakes = 120;
                const flakes = [];
                for (let i = 0; i < maxFlakes; i++) {
                    flakes.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        r: Math.random() * 2.5 + 1,
                        speedY: Math.random() * 1 + 0.4,
                        drift: Math.random() * 0.6 - 0.3
                    });
                }

                let animationId;
                const drawSnow = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
                    ctx.beginPath();

                    for (let i = 0; i < maxFlakes; i++) {
                        const f = flakes[i];
                        ctx.moveTo(f.x, f.y);
                        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);

                        f.y += f.speedY;
                        f.x += f.drift;

                        if (f.y > canvas.height || f.x > canvas.width || f.x < 0) {
                            flakes[i] = {
                                x: Math.random() * canvas.width,
                                y: -10,
                                r: f.r,
                                speedY: f.speedY,
                                drift: f.drift
                            };
                        }
                    }
                    ctx.fill();
                    animationId = requestAnimationFrame(drawSnow);
                };

                drawSnow();

                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    cancelAnimationFrame(animationId);
                };
            }, []);

            return (
                <canvas 
                    ref={canvasRef} 
                    class="absolute inset-0 w-full h-full pointer-events-none z-10"
                />
            );
        }

        function Draggable({ children, pos, setPos, handleClass, disabled }) {
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });

            const onPointerDown = (e) => {
                if (disabled) return;
                if (handleClass && !e.target.closest(`.${handleClass}`)) return;
                
                draggingRef.current = true;
                relRef.current = {
                    x: e.clientX - pos.x,
                    y: e.clientY - pos.y
                };
                e.preventDefault();
                e.stopPropagation();
            };

            React.useEffect(() => {
                const onPointerMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({
                        x: e.clientX - relRef.current.x,
                        y: e.clientY - relRef.current.y
                    });
                };

                const onPointerUp = () => {
                    draggingRef.current = false;
                };

                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
                return () => {
                    window.removeEventListener('pointermove', onPointerMove);
                    window.removeEventListener('pointerup', onPointerUp);
                };
            }, [pos, disabled, setPos]);

            const style = disabled ? {} : {
                position: 'absolute',
                left: `${pos.x}px`,
                top: `${pos.y}px`
            };

            return (
                <div onPointerDown={onPointerDown} style={style} class={`z-30 ${disabled ? 'w-full h-full' : draggingRef.current ? '' : 'transition-[left,top] duration-300 ease-in-out'}`}>
                    {children}
                </div>
            );
        }

        function OrbitOS() {
            const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/orbits-os/os/main/wallpapers/";
            
            const githubWallpapers = [
                { id: 'wall-orbit', name: 'Orbit Default', file: 'orion.png', type: 'image' },
                { id: 'wall-king', name: 'King Canvas', file: 'king.PNG', type: 'image' },
                { id: 'wall-gojo', name: 'Gojo Motion Arena', file: 'Gojo.mp4', type: 'video' },
                { id: 'wall-fox', name: 'Snow Fox Live', file: 'SnowFox.mp4', type: 'video' },
                { id: 'wall-sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const apps = [
                { id: 'hub', label: 'System Hub', icon: HubIcon, defaultX: 32, defaultY: 80 },
                { id: 'files', label: 'Storage', icon: StorageIcon, defaultX: 32, defaultY: 180 },
            ];

            const [time, setTime] = React.useState('');
            const [fps, setFps] = React.useState(60);
            
            const [activeWindow, setActiveWindow] = React.useState(() => {
                return localStorage.getItem('orbitOS_activeWindow') || null;
            });
            
            const [hubTab, setHubTab] = React.useState(() => {
                return localStorage.getItem('orbitOS_hubTab') || 'dashboard';
            });

            const [selectedWallpaper, setSelectedWallpaper] = React.useState(() => {
                const savedWp = localStorage.getItem('orbitOS_selectedWallpaper');
                if (savedWp) {
                    const parsed = githubWallpapers.find(w => w.id === savedWp);
                    if (parsed) return parsed;
                }
                return githubWallpapers[0];
            });

            const [isMaximized, setIsMaximized] = React.useState(false);
            const [isVisible, setIsVisible] = React.useState(localStorage.getItem('orbitOS_activeWindow') !== null);
            const [isAnimating, setIsAnimating] = React.useState(false);
            const [isStartOpen, setIsStartOpen] = React.useState(false);
            const [windowPos, setWindowPos] = React.useState({ x: 160, y: 96 });
            
            const [isShuttingDown, setIsShuttingDown] = React.useState(false);

            React.useEffect(() => {
                if (activeWindow) {
                    localStorage.setItem('orbitOS_activeWindow', activeWindow);
                } else {
                    localStorage.removeItem('orbitOS_activeWindow');
                }
            }, [activeWindow]);

            React.useEffect(() => {
                localStorage.setItem('orbitOS_hubTab', hubTab);
            }, [hubTab]);

            React.useEffect(() => {
                localStorage.setItem('orbitOS_selectedWallpaper', selectedWallpaper.id);
            }, [selectedWallpaper]);

            const activeAssetUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            React.useEffect(() => {
                const updateTime = () => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                };
                updateTime();
                const interval = setInterval(updateTime, 60000);
                return () => clearInterval(interval);
            }, []);

            React.useEffect(() => {
                let lastCalledTime = performance.now();
                let frameCount = 0;
                let animationId;

                const calcFps = () => {
                    const now = performance.now();
                    frameCount++;
                    if (now - lastCalledTime >= 1000) {
                        setFps(Math.round((frameCount * 1000) / (now - lastCalledTime)));
                        frameCount = 0;
                        lastCalledTime = now;
                    }
                    animationId = requestAnimationFrame(calcFps);
                };
                animationId = requestAnimationFrame(calcFps);
                return () => cancelAnimationFrame(animationId);
            }, []);

            const handleWindowClose = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                setIsVisible(false);
                setTimeout(() => {
                    setActiveWindow(null);
                    setIsMaximized(false);
                    setIsAnimating(false);
                }, 300);
            };

            const handleWindowMinimize = () => {
                if (isAnimating) return;
                setIsAnimating(true);
                setIsVisible(false);
                setTimeout(() => setIsAnimating(false), 300);
            };

            const handleAppClick = (appId, explicitTab = null) => {
                if (isAnimating) return;
                if (explicitTab) setHubTab(explicitTab);

                if (activeWindow === appId && isVisible) {
                    setIsAnimating(true);
                    setIsVisible(false);
                    setTimeout(() => setIsAnimating(false), 300);
                } else if (activeWindow === appId && !isVisible) {
                    setIsAnimating(true);
                    setIsVisible(true);
                    setTimeout(() => setIsAnimating(false), 300);
                } else {
                    setIsAnimating(true);
                    if (isVisible) {
                        setIsVisible(false);
                        setTimeout(() => {
                            setActiveWindow(appId);
                            setIsMaximized(false);
                            setIsVisible(true);
                            setIsAnimating(false);
                        }, 200);
                    } else {
                        setActiveWindow(appId);
                        setIsVisible(true);
                        setIsMaximized(false);
                        setTimeout(() => setIsAnimating(false), 300);
                    }
                }
                setIsStartOpen(false);
            };

            const triggerShutdown = () => {
                setIsStartOpen(false);
                setIsShuttingDown(true);
                
                setTimeout(() => {
                    setIsShuttingDown(false);
                }, 4500);
            };

            if (isShuttingDown) {
                return (
                    <div class="fixed inset-0 w-screen h-screen bg-zinc-950 flex flex-col justify-center items-center z-[99999] transition-all font-sans">
                        <div class="w-8 h-8 border-2 border-zinc-700 border-t-cyan-400 rounded-full animate-spin mb-4" />
                        <h2 class="text-sm font-semibold tracking-wider text-zinc-300 animate-pulse">orbitOS is shutting down...</h2>
                    </div>
                );
            }

            return (
                <div class="relative w-full h-screen text-zinc-100 overflow-hidden select-none bg-[#09090b]">
                    
                    {/* WALLPAPER ENGINE BACKGROUND LAYER */}
                    <div class="absolute inset-0 w-full h-full z-0 pointer-events-none transition-all duration-700">
                        {selectedWallpaper.type === 'video' ? (
                            <video 
                                key={activeAssetUrl}
                                src={activeAssetUrl}
                                autoPlay 
                                loop 
                                muted 
                                playsInline
                                class="w-full h-full object-cover"
                            />
                        ) : (
                            <div 
                                style={{ backgroundImage: `url('${activeAssetUrl}')` }}
                                class="w-full h-full bg-cover bg-center transition-all duration-700"
                            />
                        )}

                        {/* SNOW OVERLAY */}
                        <SnowOverlay />
                    </div>

                    <div class="absolute inset-0 bg-black/20 z-0 pointer-events-none backdrop-brightness-[0.92]" />

                    {/* TOP BAR */}
                    <header class="absolute top-0 left-0 right-0 h-10 z-50 flex items-center justify-between px-5 bg-zinc-950/40 border-b border-zinc-800/20 backdrop-blur-md text-xs font-medium text-zinc-400">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center text-white cursor-pointer hover:opacity-80 transition-opacity" onClick={(e) => { e.stopPropagation(); setIsStartOpen(!isStartOpen); }}>
                                <SystemMenuIcon className="w-4 h-4" />
                            </div>
                            <span class="text-zinc-800">|</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">File</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">View</span>
                            <span class="hover:text-zinc-200 cursor-pointer transition-colors">Special</span>
                        </div>
                        <div class="flex items-center gap-4 text-zinc-400">
                            <span class="bg-zinc-900/80 px-2 py-0.5 rounded border border-zinc-800 text-[10px] text-emerald-400 font-mono">{fps} FPS</span>
                            <span class="font-normal text-zinc-300">{time}</span>
                        </div>
                    </header>

                    {/* START MENU DROP-DOWN */}
                    {isStartOpen && (
                        <div 
                            class="absolute top-11 left-4 w-64 bg-zinc-950/95 border border-zinc-800/80 backdrop-blur-2xl rounded-xl z-50 shadow-2xl flex flex-col overflow-hidden transition-all animate-in fade-in slide-in-from-top-2 duration-150"
                            onClick={(e) => e.stopPropagation()}
                        >
                            {/* Pinned Applications Content Zone */}
                            <div class="p-3 flex-1 flex flex-col gap-0.5 min-h-[160px]">
                                <div class="text-[9px] font-bold text-zinc-500 px-3 py-1 uppercase tracking-wider">Applications</div>
                                {apps.map(app => (
                                    <button 
                                        key={app.id}
                                        onClick={() => handleAppClick(app.id)}
                                        class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium text-zinc-300 hover:bg-zinc-800/60 hover:text-white flex items-center gap-2.5 transition-colors cursor-pointer group"
                                    >
                                        <div class="scale-75 text-zinc-400 group-hover:text-cyan-400 transition-colors"><app.icon /></div>
                                        {app.label}
                                    </button>
                                ))}
                            </div>

                            {/* Integrated Task Footer */}
                            <div class="h-12 bg-zinc-900/40 border-t border-zinc-800/50 px-4 flex items-center justify-between shrink-0">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full bg-zinc-700/60 border border-zinc-600/40" />
                                    <span class="text-[11px] font-medium text-zinc-400">User Account</span>
                                </div>
                                
                                {/* Power Toggle Control */}
                                <button 
                                    onClick={triggerShutdown}
                                    class="group p-2 rounded-lg hover:bg-zinc-800/80 transition-colors cursor-pointer"
                                    title="Shut Down System"
                                >
                                    <PowerIcon />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* DESKTOP WORKSPACE */}
                    <main class="relative w-full h-full z-10" onClick={() => setIsStartOpen(false)}>
                        
                        {/* SHORTCUTS */}
                        {apps.map((app) => {
                            const AppIcon = app.icon;
                            const isOpen = activeWindow === app.id && isVisible;
                            return (
                                <div key={app.id} style={{ position: 'absolute', left: `${app.defaultX}px`, top: `${app.defaultY}px` }} class="z-20">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); handleAppClick(app.id); }}
                                        class="group flex flex-col items-center justify-center w-20 h-20 rounded-xl border border-transparent hover:border-zinc-700/30 hover:bg-zinc-950/30 transition-all text-center cursor-pointer"
                                    >
                                        <div class={`p-3 rounded-xl bg-zinc-950/40 border border-zinc-800/30 backdrop-blur-md shadow-md relative text-zinc-300 group-hover:text-zinc-100 pointer-events-none transition-all duration-300
                                            ${isOpen ? 'bg-zinc-900/80 border-zinc-700/60 scale-105 shadow-cyan-950/20' : ''}`}>
                                            <AppIcon />
                                            {activeWindow === app.id && (
                                                <span class={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full transition-all duration-300 ${isVisible ? 'bg-zinc-100' : 'bg-zinc-500'}`} />
                                            )}
                                        </div>
                                        <span class="text-[10px] mt-2 text-zinc-300 group-hover:text-zinc-100 font-medium drop-shadow-md truncate w-full px-1 pointer-events-none">
                                            {app.label}
                                        </span>
                                    </button>
                                </div>
                            );
                        })}

                        {/* WINDOW COMPONENT */}
                        {activeWindow && (
                            <div class={`w-full h-full absolute inset-0 z-30 ${isVisible ? "" : "pointer-events-none"}`}>
                                <Draggable pos={windowPos} setPos={setWindowPos} handleClass="window-drag-bar" disabled={isMaximized}>
                                    <div 
                                        style={
                                            isMaximized 
                                                ? { position: 'fixed', left: '16px', top: '56px', width: 'calc(100vw - 32px)', height: 'calc(100vh - 102px)' } 
                                                : { width: 'calc(100vw - 220px)', height: 'calc(100vh - 240px)', minWidth: '540px', minHeight: '400px' }
                                        }
                                        class={`bg-zinc-950/92 border border-zinc-800/80 backdrop-blur-xl rounded-xl shadow-2xl flex flex-col overflow-hidden ease-in-out origin-center
                                            transition-[opacity,transform,blur,width,height,left,top,position] duration-300
                                            ${isVisible ? 'opacity-100 scale-100 blur-none' : 'opacity-0 scale-95 blur-sm pointer-events-none'}`}
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        {/* Frame Drag bar */}
                                        <div class="window-drag-bar h-12 bg-zinc-900/40 border-b border-zinc-800/30 flex items-center px-5 cursor-grab active:cursor-grabbing select-none relative shrink-0">
                                            <div class="flex items-center gap-2 group/lights z-10">
                                                <button onClick={handleWindowClose} class="w-3 h-3 rounded-full bg-[#ff5f56] border border-[#e0443e] flex items-center justify-center cursor-pointer relative"><span class="text-[9px] font-bold text-[#4c0002] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">✕</span></button>
                                                <button onClick={handleWindowMinimize} class="w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#dea123] flex items-center justify-center cursor-pointer relative"><span class="text-[11px] font-bold text-[#5c3e00] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-1.5">_</span></button>
                                                <button onClick={() => setIsMaximized(!isMaximized)} class="w-3 h-3 rounded-full bg-[#27c93f] border border-[#1aaa2c] flex items-center justify-center cursor-pointer relative"><span class="text-[7px] font-bold text-[#004d05] opacity-0 group-hover/lights:opacity-100 transition-opacity absolute pb-0.5">{isMaximized ? '⌥' : '⤢'}</span></button>
                                            </div>
                                            <div class="absolute inset-x-0 text-center pointer-events-none">
                                                <span class="text-xs font-semibold tracking-wide text-zinc-400 capitalize">{activeWindow === 'hub' ? 'System Hub' : 'Storage Explorer'}</span>
                                            </div>
                                        </div>

                                        {/* Viewport Frame */}
                                        <div class="flex-1 overflow-y-auto cursor-default">
                                            
                                            {/* SYSTEM HUB */}
                                            {activeWindow === 'hub' && (
                                                <div class="flex h-full min-h-[320px]">
                                                    <div class="w-44 border-r border-zinc-800/40 bg-zinc-900/20 p-3 space-y-1 shrink-0 select-none">
                                                        <div class="text-[9px] font-bold text-zinc-600 px-3 uppercase tracking-wider mb-1">Status Environment</div>
                                                        <button onClick={() => setHubTab('dashboard')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'dashboard' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>Dashboard Metrics</button>
                                                        
                                                        <div class="text-[9px] font-bold text-zinc-600 px-3 uppercase tracking-wider mt-4 mb-1">Configurations</div>
                                                        <button onClick={() => setHubTab('wallpaper')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'wallpaper' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>Wallpaper Engine</button>
                                                        <button onClick={() => setHubTab('system')} class={`w-full text-left px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer transition-colors ${hubTab === 'system' ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-zinc-200'}`}>System Properties</button>
                                                    </div>

                                                    <div class="flex-1 p-6 overflow-y-auto">
                                                        {hubTab === 'dashboard' && (
                                                            <div class="space-y-6">
                                                                <div>
                                                                    <h2 class="text-base font-bold text-white">System Diagnostics</h2>
                                                                    <p class="text-[11px] text-zinc-400 mt-0.5">Telemetry tracking for memory display frames.</p>
                                                                </div>
                                                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                                    <div class="p-4 rounded-xl bg-zinc-900/30 border border-zinc-800/40 shadow-inner">
                                                                        <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Engine Performance</div>
                                                                        <div class="text-2xl font-bold text-emerald-400 mt-1 font-mono">{fps} <span class="text-xs text-zinc-500 font-normal font-sans">FPS</span></div>
                                                                    </div>
                                                                    <div class="p-4 rounded-xl bg-zinc-900/30 border border-zinc-800/40 shadow-inner">
                                                                        <div class="text-[10px] text-zinc-500 font-medium uppercase tracking-wider">Active Canvas Node</div>
                                                                        <div class="text-xs font-semibold text-zinc-200 mt-2.5 truncate flex items-center gap-1.5">
                                                                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse" /> {selectedWallpaper.name}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}

                                                        {hubTab === 'wallpaper' && (
                                                            <div>
                                                                <div class="mb-4">
                                                                    <h3 class="text-sm font-bold text-white">Mixed Media Wallpaper Matrix</h3>
                                                                    <p class="text-[11px] text-zinc-400 mt-0.5">Streaming live files directly from your repository layer.</p>
                                                                </div>
                                                                <div class="grid grid-cols-2 gap-3">
                                                                    {githubWallpapers.map((wp) => {
                                                                        const isCurrent = wp.id === selectedWallpaper.id;
                                                                        return (
                                                                            <button
                                                                                key={wp.id}
                                                                                onClick={() => setSelectedWallpaper(wp)}
                                                                                class={`p-3 rounded-lg border text-left cursor-pointer transition-all flex flex-col justify-between h-20 ${isCurrent ? 'bg-zinc-800/60 border-cyan-500/50 shadow-lg shadow-cyan-950/20' : 'bg-zinc-900/30 border-zinc-800/50 hover:border-zinc-700/80'}`}
                                                                            >
                                                                                <span class="text-xs font-semibold text-zinc-200 block truncate w-full">{wp.name}</span>
                                                                                <span class="text-[9px] font-mono uppercase px-1.5 py-0.5 rounded bg-zinc-950/60 border border-zinc-800 text-zinc-400 self-start">{wp.type}</span>
                                                                            </button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )}

                                                        {hubTab === 'system' && (
                                                            <div class="space-y-4">
                                                                <div>
                                                                    <h3 class="text-sm font-bold text-white">Environment Details</h3>
                                                                    <p class="text-[11px] text-zinc-400 mt-0.5">System properties architecture profile.</p>
                                                                </div>
                                                                <div class="border border-zinc-800/60 rounded-xl overflow-hidden bg-zinc-900/10">
                                                                    <div class="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800/40 text-xs"><span class="text-zinc-500 font-medium">OS Name</span><span class="text-zinc-300 font-mono">orbitOS</span></div>
                                                                    <div class="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800/40 text-xs"><span class="text-zinc-500 font-medium">Framework Base</span><span class="text-zinc-300 font-mono">React 18.2.0</span></div>
                                                                    <div class="flex items-center justify-between px-4 py-2.5 text-xs"><span class="text-zinc-500 font-medium">Style Engine</span><span class="text-zinc-300 font-mono">Tailwind CSS v4</span></div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}

                                            {/* STORAGE APP */}
                                            {activeWindow === 'files' && (
                                                <div class="p-6 space-y-4">
                                                    <div>
                                                        <h2 class="text-base font-bold text-white">Storage Volumes</h2>
                                                        <p class="text-[11px] text-zinc-400 mt-0.5">File allocation clusters and structural file indexes.</p>
                                                    </div>
                                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                        <div class="p-4 bg-zinc-900/30 border border-zinc-800/40 rounded-xl flex gap-4 items-center">
                                                            <div class="p-3 bg-zinc-950/60 rounded-xl text-zinc-400 border border-zinc-800"><StorageIcon /></div>
                                                            <div class="flex-1 min-w-0">
                                                                <div class="text-xs font-bold text-zinc-200">System (C:)</div>
                                                                <div class="w-full bg-zinc-900 h-1.5 rounded-full mt-2 overflow-hidden border border-zinc-800/40">
                                                                    <div class="bg-cyan-500 h-full w-[42%]" />
                                                                </div>
                                                                <div class="flex justify-between text-[10px] text-zinc-500 font-medium mt-1.5"><span>42% Allocated</span><span>128 GB Free</span></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </Draggable>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrbitOS />);
    </script>
</body>
</html>
