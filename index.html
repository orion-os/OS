<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>orbitOS Desktop</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5'><ellipse cx='12' cy='12' rx='9' ry='3' transform='rotate(-30 12 12)' stroke-linecap='round' stroke-linejoin='round'/><circle cx='12' cy='12' r='3.5' fill='white'/><circle cx='5' cy='8' r='1' fill='white'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 m-0 p-0 select-none overflow-hidden antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const HubIcon = () => (<svg className="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>);
        const MediaIcon = () => (<svg className="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 9 5 3-5 3V9z"/></svg>);
        const StorageIcon = () => (<svg className="w-5.5 h-5.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>);
        const PowerIcon = () => (<svg className="w-4 h-4 text-zinc-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77 0"/></svg>);

        const OrbitIcon = ({ className = "w-6 h-6" }) => (
            <svg className={`${className} text-white transition-colors drop-shadow-[0_0_8px_rgba(255,255,255,0.4)] group-hover:text-cyan-400`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <ellipse cx="12" cy="12" rx="9" ry="3" transform="rotate(-30 12 12)"/>
                <circle cx="12" cy="12" r="3.5" fill="currentColor"/>
                <circle cx="5" cy="8" r="1" fill="currentColor"/>
            </svg>
        );

        const soundEffects = {
            click: new Audio('https://freesound.org/data/previews/174/174893_2921711-lq.mp3'),
            open: new Audio('https://freesound.org/data/previews/256/256696_3989065-lq.mp3'),
            close: new Audio('https://freesound.org/data/previews/256/256692_3989065-lq.mp3'),
            minimize: new Audio('https://freesound.org/data/previews/256/256694_3989065-lq.mp3'),
            wallpaper: new Audio('https://freesound.org/data/previews/256/256698_3989065-lq.mp3')
        };

        function SnowOverlay() {
            const canvasRef = React.useRef(null);
            React.useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);

                const flakes = Array.from({ length: 140 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 3 + 1,
                    speed: Math.random() * 1.4 + 0.6,
                    drift: Math.random() * 0.8 - 0.4,
                }));

                let id;
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "rgba(255,255,255,0.85)";
                    flakes.forEach(f => {
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                        ctx.fill();
                        f.y += f.speed;
                        f.x += f.drift;
                        if (f.y > canvas.height) {
                            f.y = -10;
                            f.x = Math.random() * canvas.width;
                        }
                    });
                    id = requestAnimationFrame(animate);
                };
                animate();
                return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(id); };
            }, []);
            return <canvas ref={canvasRef} className="absolute inset-0 pointer-events-none z-10" />;
        }

        function Draggable({ children, pos, setPos, handleClass, disabled }) {
            const draggingRef = React.useRef(false);
            const relRef = React.useRef({ x: 0, y: 0 });
            const onDown = (e) => {
                if (disabled) return;
                if (handleClass && !e.target.closest('.' + handleClass)) return;
                draggingRef.current = true;
                relRef.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
                e.preventDefault();
            };
            React.useEffect(() => {
                const onMove = (e) => {
                    if (!draggingRef.current) return;
                    setPos({ x: e.clientX - relRef.current.x, y: e.clientY - relRef.current.y });
                };
                const onUp = () => draggingRef.current = false;
                window.addEventListener('pointermove', onMove);
                window.addEventListener('pointerup', onUp);
                return () => {
                    window.removeEventListener('pointermove', onMove);
                    window.removeEventListener('pointerup', onUp);
                };
            }, [setPos]);

            return (
                <div onPointerDown={onDown} style={disabled ? {} : { position: 'absolute', left: pos.x + 'px', top: pos.y + 'px' }} className="z-30">
                    {children}
                </div>
            );
        }

        function OrbitOS() {
            const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/orbits-os/os/main/wallpapers/";
            const githubWallpapers = [
                { id: 'wall-orbit', name: 'Orbit Default', file: 'orbit.png', type: 'image' },
                { id: 'wall-king', name: 'King Canvas', file: 'king.PNG', type: 'image' },
                { id: 'wall-gojo', name: 'Gojo Motion Arena', file: 'Gojo.mp4', type: 'video' },
                { id: 'wall-fox', name: 'Snow Fox Live', file: 'SnowFox.mp4', type: 'video' },
                { id: 'wall-sukuna', name: 'Sukuna Fire Unleashed', file: 'sukuna-fire.mp4', type: 'video' }
            ];

            const apps = [
                { id: 'hub', label: 'System Hub', icon: HubIcon, defaultX: 40, defaultY: 80 },
                { id: 'library', label: 'Media Deck', icon: MediaIcon, defaultX: 40, defaultY: 180 },
                { id: 'files', label: 'Storage', icon: StorageIcon, defaultX: 40, defaultY: 280 },
            ];

            const [time, setTime] = React.useState('');
            const [fps, setFps] = React.useState(60);
            const [activeWindow, setActiveWindow] = React.useState(null);
            const [hubTab, setHubTab] = React.useState('dashboard');
            const [selectedWallpaper, setSelectedWallpaper] = React.useState(githubWallpapers[0]);
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [isVisible, setIsVisible] = React.useState(false);
            const [isStartOpen, setIsStartOpen] = React.useState(false);
            const [windowPos, setWindowPos] = React.useState({ x: 200, y: 120 });

            const activeAssetUrl = `${GITHUB_RAW_BASE}${encodeURIComponent(selectedWallpaper.file)}`;

            React.useEffect(() => {
                soundEffects.wallpaper.currentTime = 0;
                soundEffects.wallpaper.play().catch(() => {});
            }, [selectedWallpaper.id]);

            React.useEffect(() => {
                const updateTime = () => setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }));
                updateTime();
                setInterval(updateTime, 60000);
            }, []);

            const handleAppClick = (appId) => {
                soundEffects.click.currentTime = 0;
                soundEffects.click.play().catch(() => {});
                if (activeWindow === appId && isVisible) {
                    soundEffects.close.currentTime = 0;
                    soundEffects.close.play().catch(() => {});
                    setIsVisible(false);
                } else {
                    setActiveWindow(appId);
                    setIsVisible(true);
                    soundEffects.open.currentTime = 0;
                    soundEffects.open.play().catch(() => {});
                }
                setIsStartOpen(false);
            };

            const handleWindowClose = () => {
                soundEffects.close.currentTime = 0;
                soundEffects.close.play().catch(() => {});
                setIsVisible(false);
                setTimeout(() => setActiveWindow(null), 300);
            };

            return (
                <div className="relative w-full h-screen overflow-hidden">
                    {/* Wallpaper */}
                    <div className="absolute inset-0 z-0">
                        {selectedWallpaper.type === 'video' ? (
                            <video key={activeAssetUrl} src={activeAssetUrl} autoPlay loop muted playsInline className="w-full h-full object-cover" />
                        ) : (
                            <div style={{ backgroundImage: `url('${activeAssetUrl}')` }} className="w-full h-full bg-cover bg-center" />
                        )}
                        <SnowOverlay />
                    </div>
                    <div className="absolute inset-0 bg-black/30 z-0" />

                    {/* Top Bar */}
                    <header className="absolute top-0 left-0 right-0 h-11 z-50 flex items-center justify-between px-6 bg-zinc-950/60 backdrop-blur-md border-b border-zinc-700 text-sm">
                        <div className="flex items-center gap-4">
                            <div onClick={() => setIsStartOpen(!isStartOpen)} className="cursor-pointer">
                                <OrbitIcon className="w-5 h-5" />
                            </div>
                        </div>
                        <div className="flex items-center gap-6 text-zinc-300">
                            <span>{fps} FPS</span>
                            <span>{time}</span>
                        </div>
                    </header>

                    {/* Desktop Icons */}
                    <main className="relative z-10 h-full" onClick={() => setIsStartOpen(false)}>
                        {apps.map(app => (
                            <div key={app.id} style={{ left: app.defaultX + 'px', top: app.defaultY + 'px' }} className="absolute z-20">
                                <button onClick={() => handleAppClick(app.id)} className="flex flex-col items-center w-20 group">
                                    <div className="p-3 rounded-2xl bg-zinc-900/70 border border-zinc-700 group-hover:scale-110 transition-transform">
                                        <app.icon />
                                    </div>
                                    <span className="text-xs mt-1.5 text-zinc-300">{app.label}</span>
                                </button>
                            </div>
                        ))}

                        {/* Window */}
                        {activeWindow && (
                            <Draggable pos={windowPos} setPos={setWindowPos} disabled={isMaximized}>
                                <div className={`bg-zinc-950/95 border border-zinc-700 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col overflow-hidden transition-all ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-95 pointer-events-none'}`}
                                    style={isMaximized ? { position: 'fixed', inset: '60px 20px 80px 20px' } : { width: '780px', height: '520px' }}>
                                    <div className="h-11 bg-zinc-900 flex items-center px-4 cursor-move window-drag-bar">
                                        <div className="flex gap-2">
                                            <button onClick={handleWindowClose} className="w-3 h-3 rounded-full bg-red-500" />
                                            <button onClick={() => setIsVisible(false)} className="w-3 h-3 rounded-full bg-yellow-500" />
                                            <button onClick={() => setIsMaximized(!isMaximized)} className="w-3 h-3 rounded-full bg-green-500" />
                                        </div>
                                        <div className="flex-1 text-center text-sm text-zinc-400">
                                            {activeWindow === 'hub' ? 'System Hub' : activeWindow === 'files' ? 'Storage' : 'Media Deck'}
                                        </div>
                                    </div>
                                    <div className="flex-1 p-6 overflow-auto">
                                        {activeWindow === 'hub' && <div>System Hub Content (add your full JSX here)</div>}
                                        {activeWindow === 'files' && <div>Storage Explorer Content</div>}
                                        {activeWindow === 'library' && <div>Media Deck Content</div>}
                                    </div>
                                </div>
                            </Draggable>
                        )}
                    </main>

                    {/* Taskbar */}
                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 z-50 bg-zinc-900/80 border border-zinc-700 backdrop-blur-2xl rounded-3xl px-4 py-2 flex items-center gap-2 shadow-2xl">
                        <button onClick={() => setIsStartOpen(!isStartOpen)} className="p-3 hover:bg-zinc-800 rounded-2xl transition-colors">
                            <OrbitIcon className="w-6 h-6" />
                        </button>
                        {apps.map(app => (
                            <button key={app.id} onClick={() => handleAppClick(app.id)} className="p-3 hover:bg-zinc-800 rounded-2xl transition-colors">
                                <app.icon />
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(OrbitOS));
    </script>
</body>
</html>
